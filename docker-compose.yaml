services:
  postgres:
    image: postgres:15-alpine
    container_name: n8n_postgres_local
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${LOCAL_DB_USER:-n8n}
      - POSTGRES_PASSWORD=${LOCAL_DB_PASSWORD:-n8n_password}
      - POSTGRES_DB=${LOCAL_DB_NAME:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.6.4
    container_name: n8n_local
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Europe/Madrid}
      - NODE_OPTIONS=--max-http-header-size=16384
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - N8N_CODE_ENV_ALLOW_LIST=OPENAI_API_KEY
      # PostgreSQL (Local)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${LOCAL_DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${LOCAL_DB_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${LOCAL_DB_PASSWORD:-n8n_password}
      - DB_POSTGRESDB_SSL_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files

volumes:
  n8n_data:
    external: false
  postgres_data:
    external: false
